<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>University Custom Chrome Extensions | v76nl</title>
        <meta
            name="description"
            content="大学にまつわるさまざまなWebサイトをカスタマイズするChrome拡張機能の一覧"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
        <style>
            /* ── ページ固有スタイル ─────────────────────────── */

            /* ヘッダーナビ */
            .page-header {
                position: sticky;
                top: 0;
                z-index: 100;
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--glass-border);
                background: hsla(var(--hue-bg), 25%, 97%, 0.8);
            }
            .page-header-inner {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 16px 28px;
                max-width: 920px;
                margin: 0 auto;
            }
            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-size: 0.82rem;
                color: var(--text-muted);
                text-decoration: none;
                transition: color 0.2s;
            }
            .back-link:hover {
                color: var(--primary);
            }
            .back-link svg {
                width: 14px;
                height: 14px;
                fill: none;
                stroke: currentColor;
                stroke-width: 2;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .page-header-sep {
                color: var(--text-faint);
                font-size: 0.78rem;
            }
            .page-header-title {
                font-size: 0.85rem;
                color: var(--text-muted);
                font-weight: 500;
            }

            /* ページヒーロー */
            .page-hero {
                padding: 72px 0 56px;
                position: relative;
                overflow: hidden;
            }
            .page-hero-orb {
                position: absolute;
                border-radius: 50%;
                pointer-events: none;
            }
            .page-hero-orb--a {
                width: 380px;
                height: 380px;
                top: -60px;
                right: -60px;
                background: radial-gradient(
                    circle,
                    var(--primary-glow) 0%,
                    transparent 68%
                );
                animation: orb-float 10s ease-in-out infinite;
            }
            .page-hero-orb--b {
                width: 260px;
                height: 260px;
                bottom: -40px;
                left: 10%;
                background: radial-gradient(
                    circle,
                    var(--pink-glow) 0%,
                    transparent 68%
                );
                animation: orb-float 14s ease-in-out infinite reverse;
            }

            .page-eyebrow {
                font-size: 0.72rem;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: var(--primary);
                font-weight: 500;
                margin-bottom: 14px;
                opacity: 0;
                animation: fade-up 0.7s 0.1s forwards;
            }
            .page-title {
                font-family: 'Noto Serif JP', serif;
                font-size: clamp(1.8rem, 5vw, 3rem);
                font-weight: 900;
                line-height: 1.2;
                background: linear-gradient(
                    145deg,
                    hsl(var(--hue-bg), 25%, 10%) 0%,
                    var(--primary) 60%,
                    var(--pink) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 16px;
                opacity: 0;
                animation: fade-up 0.7s 0.25s forwards;
            }
            .page-desc {
                font-size: 0.95rem;
                color: var(--text-muted);
                max-width: 520px;
                line-height: 1.8;
                opacity: 0;
                animation: fade-up 0.7s 0.4s forwards;
            }
            .page-meta {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
                margin-top: 28px;
                opacity: 0;
                animation: fade-up 0.7s 0.55s forwards;
            }
            .page-meta-item {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 0.8rem;
                color: var(--text-faint);
            }
            .page-meta-item svg {
                width: 14px;
                height: 14px;
                fill: currentColor;
                flex-shrink: 0;
            }

            /* 拡張機能カード */
            .ext-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
                padding-bottom: 80px;
            }

            .ext-card {
                position: relative;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                border-radius: var(--radius);
                padding: 28px 24px;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                display: flex;
                flex-direction: column;
                gap: 12px;
                transition: var(--transition);
                overflow: hidden;
            }
            .ext-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg, var(--primary), var(--pink));
                transform: scaleX(0);
                transform-origin: left;
                transition: transform 0.4s ease;
            }
            .ext-card:hover {
                border-color: var(--glass-border-h);
                transform: translateY(-6px);
                box-shadow:
                    var(--shadow),
                    0 0 32px var(--primary-glow);
            }
            .ext-card:hover::before {
                transform: scaleX(1);
            }

            .ext-status-badge {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 0.68rem;
                font-weight: 500;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                padding: 3px 10px;
                border-radius: var(--radius-pill);
                align-self: flex-start;
            }
            .ext-status-badge::before {
                content: '';
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: currentColor;
                opacity: 0.7;
            }
            .ext-status-badge.active {
                background: hsla(var(--hue-mint), 55%, 50%, 0.15);
                color: hsl(var(--hue-mint), 55%, 36%);
                border: 1px solid hsla(var(--hue-mint), 55%, 45%, 0.35);
            }
            .ext-status-badge.archived {
                background: hsla(var(--hue-bg), 15%, 50%, 0.1);
                color: var(--text-faint);
                border: 1px solid var(--glass-border);
            }
            .ext-status-badge.wip {
                background: hsla(var(--hue-yellow), 80%, 55%, 0.14);
                color: hsl(var(--hue-yellow), 75%, 36%);
                border: 1px solid hsla(var(--hue-yellow), 80%, 50%, 0.35);
            }

            .ext-title {
                font-family: 'Noto Serif JP', serif;
                font-size: 1rem;
                font-weight: 700;
                line-height: 1.45;
                margin: 0;
            }
            .ext-description {
                font-size: 0.84rem;
                color: var(--text-muted);
                line-height: 1.75;
                flex: 1;
            }
            .ext-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .ext-footer {
                display: flex;
                justify-content: flex-end;
                padding-top: 8px;
                border-top: 1px solid var(--glass-border);
                margin-top: auto;
            }
            .ext-github-link {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-size: 0.78rem;
                color: var(--text-muted);
                text-decoration: none;
                padding: 6px 14px;
                border: 1px solid var(--glass-border);
                border-radius: var(--radius-pill);
                transition: var(--transition);
                font-family: 'Noto Sans JP', sans-serif;
            }
            .ext-github-link:hover {
                border-color: var(--primary);
                color: var(--primary);
            }
            .ext-github-link svg {
                width: 14px;
                height: 14px;
                fill: currentColor;
                flex-shrink: 0;
            }

            /* ローディング / エラー */
            #loading-message {
                text-align: center;
                color: var(--text-faint);
                padding: 60px 0;
                font-size: 0.9rem;
            }

            @media (max-width: 640px) {
                .ext-grid {
                    grid-template-columns: 1fr;
                }
                .page-hero {
                    padding: 48px 0 40px;
                }
                .page-header-title {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="noise-overlay" aria-hidden="true"></div>

        <!-- 固定ヘッダー -->
        <header class="page-header" role="banner">
            <div class="page-header-inner">
                <a
                    href="./index.html"
                    class="back-link"
                    aria-label="ポートフォリオに戻る"
                >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    戻る
                </a>
                <span class="page-header-sep" aria-hidden="true">/</span>
                <span class="page-header-title"
                    >University Custom Chrome Extensions</span
                >
            </div>
        </header>

        <!-- ページヒーロー -->
        <section class="page-hero" aria-label="ページ概要">
            <div
                class="page-hero-orb page-hero-orb--a"
                aria-hidden="true"
            ></div>
            <div
                class="page-hero-orb page-hero-orb--b"
                aria-hidden="true"
            ></div>
            <div class="container">
                <p class="page-eyebrow">Chrome Extension</p>
                <h1 class="page-title">University Custom<br />Chrome Extensions</h1>
                <p class="page-desc">
                    中央大学内で使用されているポータルサイト「manaba」をはじめとする、大学に関係するさまざまな Web サイトをカスタマイズする
                    Chrome
                    拡張機能のコレクション。学生生活をより快適にするため、
                    UX改善・UI変更・機能追加など様々な観点から開発しています。
                </p>
            </div>
        </section>

        <!-- 拡張機能グリッド -->
        <main>
            <div class="container">
                <p id="loading-message" role="status" aria-live="polite">
                    読み込み中…
                </p>
                <div
                    class="ext-grid"
                    id="ext-grid"
                    aria-label="拡張機能一覧"
                ></div>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer-inner">
                <p class="footer-copy"></p>
                <div class="footer-links">
                    <a
                        href="https://github.com/v76nl?tab=repositories&q=crx"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="footer-link"
                        aria-label="GitHub で全リポジトリを見る"
                    >
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.298 24 12c0-6.627-5.373-12-12-12z"
                            />
                        </svg>
                    </a>
                </div>
            </div>
        </footer>

        <script>
            // ── アプリ設定 ──────────────────────────────────────────
            const DEBUG = false;
            const ACTIVE_THEME = 'sunset';
            // ────────────────────────────────────────────────────────

            const THEMES = {
                pastel: {
                    '--hue-bg': 222,
                    '--hue-primary': 194,
                    '--hue-pink': 338,
                    '--hue-yellow': 50,
                    '--hue-lavender': 268,
                    '--hue-mint': 162,
                },
                ocean: {
                    '--hue-bg': 215,
                    '--hue-primary': 200,
                    '--hue-pink': 20,
                    '--hue-yellow': 45,
                    '--hue-lavender': 240,
                    '--hue-mint': 175,
                },
                sunset: {
                    '--hue-bg': 240,
                    '--hue-primary': 30,
                    '--hue-pink': 350,
                    '--hue-yellow': 55,
                    '--hue-lavender': 280,
                    '--hue-mint': 140,
                },
                forest: {
                    '--hue-bg': 160,
                    '--hue-primary': 145,
                    '--hue-pink': 20,
                    '--hue-yellow': 62,
                    '--hue-lavender': 290,
                    '--hue-mint': 175,
                },
            };

            function applyTheme(name) {
                const theme = THEMES[name];
                if (!theme) {
                    if (DEBUG) console.warn(`Theme "${name}" not found.`);
                    return;
                }
                const root = document.documentElement;
                for (const [prop, value] of Object.entries(theme)) {
                    root.style.setProperty(prop, String(value));
                }
            }

            function escHtml(str) {
                if (str == null) return '';
                return String(str).replace(
                    /[&<>"']/g,
                    (c) =>
                        ({
                            '&': '&amp;',
                            '<': '&lt;',
                            '>': '&gt;',
                            '"': '&quot;',
                            "'": '&#39;',
                        })[c]
                );
            }

            // JSONC パーサー（main.js と同じ実装）
            function parseJsonc(text) {
                let out = '';
                let i = 0;
                const len = text.length;
                while (i < len) {
                    const ch = text[i];
                    if (ch === '"') {
                        out += ch;
                        i++;
                        while (i < len) {
                            const sc = text[i];
                            out += sc;
                            i++;
                            if (sc === '\\') {
                                if (i < len) {
                                    out += text[i];
                                    i++;
                                }
                            } else if (sc === '"') break;
                        }
                        continue;
                    }
                    if (ch === '/' && text[i + 1] === '/') {
                        while (i < len && text[i] !== '\n' && text[i] !== '\r')
                            i++;
                        continue;
                    }
                    if (ch === '/' && text[i + 1] === '*') {
                        i += 2;
                        while (
                            i < len &&
                            !(text[i] === '*' && text[i + 1] === '/')
                        )
                            i++;
                        i += 2;
                        continue;
                    }
                    out += ch;
                    i++;
                }
                return JSON.parse(out);
            }

            const ICON_GITHUB = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.298 24 12c0-6.627-5.373-12-12-12z"/></svg>`;

            const STATUS_LABEL = {
                active: '公開中',
                archived: 'アーカイブ',
                wip: '開発中',
            };

            // tag color は index % 5 で割り当て
            const tagColorMap = {};
            let tagColorCounter = 0;
            function getTagColor(tag) {
                if (!(tag in tagColorMap)) {
                    tagColorMap[tag] = tagColorCounter++ % 5;
                }
                return tagColorMap[tag];
            }

            function renderExtensions(extensions) {
                const grid = document.getElementById('ext-grid');
                const loading = document.getElementById('loading-message');
                if (loading) loading.remove();

                grid.innerHTML = extensions
                    .map((ext, i) => {
                        const status = ext.status ?? 'active';
                        const tagsHtml = (ext.tags ?? [])
                            .map(
                                (t) =>
                                    `<span class="tag" data-color="${getTagColor(t)}">${escHtml(t)}</span>`
                            )
                            .join('');
                        const delay = (i % 3) * 80;
                        const githubHtml = ext.github
                            ? `<a href="${escHtml(ext.github)}" target="_blank" rel="noopener noreferrer"
                  class="ext-github-link" aria-label="${escHtml(ext.title)} のリポジトリ">
                 ${ICON_GITHUB} GitHub
               </a>`
                            : '';

                        return `
            <article class="ext-card fade-up" style="transition-delay:${delay}ms"
                     aria-label="${escHtml(ext.title)}">
              <span class="ext-status-badge ${escHtml(status)}" aria-label="ステータス: ${escHtml(STATUS_LABEL[status] ?? status)}">
                ${escHtml(STATUS_LABEL[status] ?? status)}
              </span>
              <h2 class="ext-title">${escHtml(ext.title)}</h2>
              <p class="ext-description">${escHtml(ext.description ?? '')}</p>
              <div class="ext-tags" aria-label="タグ">${tagsHtml}</div>
              ${githubHtml ? `<div class="ext-footer">${githubHtml}</div>` : ''}
            </article>`;
                    })
                    .join('');

                // スクロールアニメーション
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((e) => {
                            if (e.isIntersecting) {
                                e.target.classList.add('visible');
                                observer.unobserve(e.target);
                            }
                        });
                    },
                    { threshold: 0.08 }
                );

                document
                    .querySelectorAll('.ext-card.fade-up')
                    .forEach((el) => observer.observe(el));
            }

            async function main() {
                applyTheme(ACTIVE_THEME);

                try {
                    if (DEBUG) console.log('[1] fetch univ-crx.jsonc');
                    const res = await fetch('./data/univ-crx.jsonc');
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data = parseJsonc(await res.text());
                    if (DEBUG) console.log('[2] parsed:', data);

                    renderExtensions(data.extensions ?? []);
                } catch (err) {
                    console.error('load error:', err);
                    const loading = document.getElementById('loading-message');
                    if (loading) {
                        loading.textContent = `データの読み込みに失敗しました: ${err.message}`;
                        loading.style.color = 'hsl(0, 70%, 55%)';
                    }
                }
            }

            main();
        </script>
    </body>
</html>
